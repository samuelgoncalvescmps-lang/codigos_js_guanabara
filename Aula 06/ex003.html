<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu site</title>
    <style>
        body {
            background-color: rgb(148, 178, 235);
            font:normal 25pt Arial;
            }
            h1 {
                color: rgb(31, 29, 177); /* comentario no css é assim */
            }

    </style>

<body>
   <h1>Olá, mundo!</h1> <!-- pra adicinar um comentário em html é assim-->
   <p>meus mano faz dinheiro dms</p>
   <script>
         var n1 = Number(window.prompt('Digite um número:'))
         var n2 = Number(window.prompt('Digite outro número: '))
         var s = n1 + n2
         window.alert("A soma dos valores é " + s) //Pro "s" virar uma string, usar o comando String(s), mas não é necessário aqui
         //(number + number) para adição
         //(string + string) para concatenação
   </script>
</body>
